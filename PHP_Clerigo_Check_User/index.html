<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Username Checker</title>
</head>
<body>
  <h2>Check Username Availability</h2>

  <label for="username">Enter a username:</label>
  <input type="text" id="username" name="username" placeholder="Type username here">
  <button onclick="checkUsername(document.getElementById('username').value)">Check</button>

  <div id="status"></div>

  <script src="script.js"></script>
</body>
</html>
